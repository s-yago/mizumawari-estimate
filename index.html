<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水回りリフォーム見積もりシステム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;color:#333;background:#f0f4f8;padding:1rem}
.app{max-width:860px;margin:0 auto}
h1{font-size:18px;font-weight:700;margin-bottom:1rem;color:#185FA5;text-align:center;padding:.75rem;background:#fff;border-radius:10px;border:1px solid #ddd}
.tabs{display:flex;margin-bottom:1rem;border-radius:8px;overflow:hidden;border:1px solid #185FA5}
.tab{flex:1;padding:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#185FA5;transition:all .15s;text-align:center}
.tab.active{background:#185FA5;color:#fff}
.base-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:#666;font-weight:600}
.field input{font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#333;width:100%}
.base-pack{background:#EBF3FC;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;border:1px solid #B5D4F4}
.base-pack-title{font-size:11px;font-weight:600;margin-bottom:.2rem;color:#185FA5}
.base-pack-amount{font-size:20px;font-weight:700;color:#185FA5}
.base-pack-note{font-size:11px;color:#5585A7;margin-top:2px}
.card{margin-bottom:1rem;border:1px solid #e0e0e0;border-radius:10px;padding:.875rem 1rem;background:#fff}
.card-title{font-size:12px;font-weight:700;color:#555;margin-bottom:.625rem;padding-bottom:.5rem;border-bottom:1px solid #eee}
.group-label{font-size:11px;color:#185FA5;padding:6px 0 3px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.item-row:last-child{border-bottom:none}
.item-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#185FA5;flex-shrink:0}
.item-label{font-size:13px;color:#333;flex:1}
.item-price{font-size:12px;color:#666;white-space:nowrap;text-align:right;min-width:95px}
.item-price.red{color:#A32D2D}
.item-qty{display:flex;align-items:center;gap:3px;flex-shrink:0}
.item-qty input{width:46px;font-size:13px;padding:3px 5px;border:1px solid #ddd;border-radius:6px;text-align:center}
.item-qty span{font-size:11px;color:#888}
.other-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.other-row:last-child{border-bottom:none}
.other-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#185FA5;flex-shrink:0}
.other-name{flex:1;font-size:13px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#333}
.other-price{width:110px;font-size:13px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;text-align:right;background:#fff;color:#333}
.other-yen{font-size:12px;color:#888;flex-shrink:0}
.totals{background:#fff;border:2px solid #185FA5;border-radius:10px;padding:1rem;margin-bottom:1rem}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;color:#555}
.total-row.main{padding-top:10px;margin-top:6px;border-top:2px solid #185FA5;font-size:17px;font-weight:700;color:#333}
.total-row.main .amt{color:#185FA5}
.red{color:#A32D2D}
.blue{color:#185FA5}
.btn-estimate{width:100%;padding:14px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:1rem}
.btn-estimate:hover{background:#0d4a80}
.btn-back{width:100%;padding:12px;background:#fff;color:#185FA5;border:2px solid #185FA5;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:1rem}
.btn-back:hover{background:#f0f4f8}
.btn-print{width:100%;padding:12px;background:#2e7d32;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:.5rem}
.btn-print:hover{background:#1b5e20}
.page{display:none}
.page.active{display:block}
.est-header{text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:3px solid #185FA5}
.est-company{font-size:11px;color:#888;margin-bottom:.5rem}
.est-title{font-size:17px;font-weight:700;margin-bottom:.25rem}
.est-total{font-size:30px;font-weight:700;color:#185FA5;margin:8px 0}
.est-note{font-size:12px;color:#666}
.est-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:1rem}
.est-table th{background:#185FA5;color:#fff;padding:8px 10px;text-align:left;font-weight:600}
.est-table th:not(:first-child){text-align:right}
.est-table td{padding:6px 10px;border-bottom:1px solid #eee}
.est-table td:not(:first-child){text-align:right}
.est-table tr.sec td{background:#f0f4f8;font-weight:700;font-size:11px;color:#555;text-align:left !important}
.est-table tr:hover td{background:#fafafa}
.est-table tr.sub td{background:#f0f4f8;font-weight:700}
.est-table tr.grand td{background:#EBF3FC;font-weight:700;font-size:15px;color:#185FA5}
.notes{margin-top:1.25rem;font-size:12px;color:#666;line-height:1.8;background:#fffde7;border-radius:6px;padding:.75rem;border:1px solid #fff9c4}
.notes p{padding-left:1em;text-indent:-1em}
.notes p::before{content:"※ "}
@media print{
  .btn-back,.btn-estimate,.btn-print,.tabs-area,.input-area{display:none !important}
  body{background:white;padding:0}
  .page.active{display:block !important}
  .est-result{display:block !important}
}
</style>
</head>
<body>
<div class="app">
  <h1>💧 水回りリフォーム 見積もりシステム</h1>

  <!-- 入力ページ -->
  <div class="page active" id="page-input">

    <div class="tabs-area">
      <div class="tabs">
        <button class="tab active" id="tab-mansion" onclick="setTab('mansion')">🏢 マンション</button>
        <button class="tab" id="tab-kodate" onclick="setTab('kodate')">🏠 戸建て</button>
      </div>
    </div>

    <div class="input-area">
      <div class="base-info">
        <div class="field"><label>お客様名</label><input type="text" id="customerName" placeholder="例：山田 太郎"></div>
        <div class="field"><label>物件住所（任意）</label><input type="text" id="address" placeholder="例：東京都渋谷区〇〇101号室"></div>
      </div>

      <div class="base-pack">
        <div class="base-pack-title">基本パック（ベース金額）</div>
        <div class="base-pack-amount">3,300,000 円</div>
        <div class="base-pack-note">水回り設備4点（UB・キッチン・洗面台・トイレ）、床CF、ハウスクリーニング込み（諸経費込）</div>
      </div>

      <div class="card">
        <div class="card-title">基本パックから除く設備（チェックで減額）</div>
        <div id="deductItems"></div>
      </div>

      <div class="card">
        <div class="card-title">追加工事（チェックで加算）</div>
        <div id="addItems"></div>
      </div>

      <div class="card" id="kodateCard" style="display:none">
        <div class="card-title">戸建て専用工事（チェックで加算）</div>
        <div id="kodateItems"></div>
      </div>

      <div class="card">
        <div class="card-title">その他工事（工事名・金額を自由入力）</div>
        <div id="otherItems"></div>
      </div>
    </div>

    <div class="totals">
      <div class="total-row"><span>ベース工事費</span><span>3,300,000 円</span></div>
      <div class="total-row"><span>不要設備 差し引き</span><span class="red" id="t-deduct">0 円</span></div>
      <div class="total-row"><span>追加オプション工事費</span><span class="blue" id="t-add">0 円</span></div>
      <div class="total-row"><span>想定外補修費用（30%）</span><span id="t-buf">0 円</span></div>
      <div class="total-row main"><span>概算総額（税込）</span><span class="amt" id="t-total">3,300,000 円</span></div>
    </div>

    <button class="btn-estimate" onclick="goToEstimate()">見積書を作成する →</button>
  </div>

  <!-- 見積書ページ -->
  <div class="page" id="page-estimate">
    <button class="btn-back" onclick="goBack()">← 入力画面に戻る</button>
    <div class="card est-result" id="estimateHTML"></div>
    <button class="btn-back" onclick="goBack()">← 入力画面に戻る</button>
    <button class="btn-print" onclick="window.print()">🖨️ 印刷 / PDF保存</button>
  </div>
</div>

<script>
const BASE = 3300000;
let currentTab = 'mansion';

const deductData = [
  {id:'ub', label:'ユニットバス（1坪タイプ）', price:800000},
  {id:'kt', label:'キッチン（2.5m幅）', price:700000},
  {id:'ws', label:'洗面台', price:100000},
  {id:'tl', label:'トイレ（1か所）', price:150000},
];

const addData = [
  {group:'壁紙張り替え', items:[
    {id:'w01', label:'洗面所の壁紙の張替え', price:50000, qty:false},
    {id:'w02', label:'キッチンの壁紙の張替え', price:80000, qty:false},
    {id:'w03', label:'トイレの壁紙の張替え', price:50000, qty:false},
    {id:'w04', label:'玄関・廊下の壁紙張り替え', price:80000, qty:false},
    {id:'w05', label:'リビング（〜10帖）の壁紙張り替え', price:120000, qty:false},
    {id:'w06', label:'リビング（〜14帖）の壁紙張り替え', price:140000, qty:false},
    {id:'w07', label:'リビング（〜16帖）の壁紙張り替え', price:160000, qty:false},
    {id:'w08', label:'リビング（〜20帖）の壁紙張り替え', price:200000, qty:false},
    {id:'w09', label:'洋室（〜6帖）の壁紙張り替え', price:80000, qty:true, unit:'部屋'},
    {id:'w10', label:'洋室（〜8帖）の壁紙張り替え', price:100000, qty:true, unit:'部屋'},
    {id:'w11', label:'洋室（〜10帖）の壁紙張り替え', price:120000, qty:true, unit:'部屋'},
    {id:'w12', label:'洋室（〜12帖）の壁紙張り替え', price:140000, qty:true, unit:'部屋'},
  ]},
  {group:'床張り替え（フローリング）', items:[
    {id:'f01', label:'キッチンの床の張替え（フローリング）', price:100000, qty:false},
    {id:'f02', label:'玄関・廊下の床の張替え（フローリング）', price:150000, qty:false},
    {id:'f03', label:'リビング（〜10帖）の床張替え（フローリング）', price:200000, qty:false},
    {id:'f04', label:'リビング（〜14帖）の床張替え（フローリング）', price:280000, qty:false},
    {id:'f05', label:'リビング（〜16帖）の床張替え（フローリング）', price:320000, qty:false},
    {id:'f06', label:'リビング（〜20帖）の床張替え（フローリング）', price:400000, qty:false},
    {id:'f07', label:'洋室（〜6帖）の床張替え（フローリング）', price:150000, qty:true, unit:'部屋'},
    {id:'f08', label:'洋室（〜8帖）の床張替え（フローリング）', price:200000, qty:true, unit:'部屋'},
    {id:'f09', label:'洋室（〜10帖）の床張替え（フローリング）', price:250000, qty:true, unit:'部屋'},
    {id:'f10', label:'洋室（〜12帖）の床張替え（フローリング）', price:300000, qty:true, unit:'部屋'},
  ]},
  {group:'その他オプション', items:[
    {id:'o01', label:'内窓の設置', price:70000, qty:true, unit:'箇所'},
    {id:'o02', label:'カーテンの設置', price:40000, qty:true, unit:'箇所'},
    {id:'o03', label:'カーテンレールの設置', price:20000, qty:true, unit:'箇所'},
    {id:'o04', label:'玄関収納棚の設置', price:80000, qty:false},
    {id:'o05', label:'コンセント移設・増設', price:40000, qty:true, unit:'箇所'},
    {id:'o06', label:'IHコンロ設置', price:50000, qty:false},
  ]},
];

const kodateData = [
  {id:'k01', label:'2階トイレ追加工事', price:250000},
  {id:'k02', label:'階段床張替工事（CF）', price:100000},
];

const OTHER_COUNT = 5;

function fmt(n){ return n.toLocaleString('ja-JP'); }

function buildDeductItems(){
  document.getElementById('deductItems').innerHTML = deductData.map(d=>
    '<div class="item-row">' +
    '<input type="checkbox" id="d_'+d.id+'" onchange="recalc()">' +
    '<label class="item-label" for="d_'+d.id+'">'+d.label+'</label>' +
    '<span class="item-price red">－'+fmt(d.price)+' 円</span>' +
    '</div>'
  ).join('');
}

function buildAddItems(){
  document.getElementById('addItems').innerHTML = addData.map(function(g){
    return '<div><div class="group-label">'+g.group+'</div>' +
    g.items.map(function(d){
      var qtyHtml = d.qty
        ? '<div class="item-qty"><input type="number" id="q_'+d.id+'" value="1" min="1" max="20" onchange="recalc()"><span>'+(d.unit||'部屋')+'</span></div>'
        : '';
      return '<div class="item-row">' +
        '<input type="checkbox" id="a_'+d.id+'" onchange="recalc()">' +
        '<label class="item-label" for="a_'+d.id+'">'+d.label+'</label>' +
        '<span class="item-price">'+fmt(d.price)+' 円</span>' +
        qtyHtml +
        '</div>';
    }).join('') + '</div>';
  }).join('');
}

function buildKodateItems(){
  document.getElementById('kodateItems').innerHTML = kodateData.map(d=>
    '<div class="item-row">' +
    '<input type="checkbox" id="k_'+d.id+'" onchange="recalc()">' +
    '<label class="item-label" for="k_'+d.id+'">'+d.label+'</label>' +
    '<span class="item-price">'+fmt(d.price)+' 円</span>' +
    '</div>'
  ).join('');
}

function buildOtherItems(){
  var html = '';
  for(var i=1;i<=OTHER_COUNT;i++){
    html += '<div class="other-row">' +
      '<input type="checkbox" id="ot_'+i+'" onchange="recalc()">' +
      '<input type="text" class="other-name" id="oname_'+i+'" placeholder="工事名を入力">' +
      '<input type="number" class="other-price" id="oprice_'+i+'" placeholder="金額" value="0" min="0" onchange="recalc()">' +
      '<span class="other-yen">円</span>' +
      '</div>';
  }
  document.getElementById('otherItems').innerHTML = html;
}

function setTab(tab){
  currentTab = tab;
  document.getElementById('tab-mansion').classList.toggle('active', tab==='mansion');
  document.getElementById('tab-kodate').classList.toggle('active', tab==='kodate');
  document.getElementById('kodateCard').style.display = tab==='kodate' ? '' : 'none';
  if(tab==='mansion'){
    kodateData.forEach(function(d){ var el=document.getElementById('k_'+d.id); if(el) el.checked=false; });
  }
  recalc();
}

function getNum(id, def){
  var el = document.getElementById(id);
  if(!el) return def||0;
  var v = parseFloat(el.value);
  return isNaN(v) ? (def||0) : v;
}

function recalc(){
  var deduct=0, add=0;
  deductData.forEach(function(d){ var el=document.getElementById('d_'+d.id); if(el&&el.checked) deduct+=d.price; });
  addData.forEach(function(g){ g.items.forEach(function(d){
    var el=document.getElementById('a_'+d.id);
    if(el&&el.checked){ var q=d.qty?Math.max(1,getNum('q_'+d.id,1)):1; add+=d.price*q; }
  }); });
  if(currentTab==='kodate'){
    kodateData.forEach(function(d){ var el=document.getElementById('k_'+d.id); if(el&&el.checked) add+=d.price; });
  }
  for(var i=1;i<=OTHER_COUNT;i++){ var el=document.getElementById('ot_'+i); if(el&&el.checked) add+=getNum('oprice_'+i,0); }
  var net=BASE-deduct+add;
  var buf=Math.round(net*0.3);
  var total=net+buf;
  document.getElementById('t-deduct').textContent = deduct>0 ? '－'+fmt(deduct)+' 円' : '0 円';
  document.getElementById('t-add').textContent = fmt(add)+' 円';
  document.getElementById('t-buf').textContent = fmt(buf)+' 円';
  document.getElementById('t-total').textContent = fmt(total)+' 円';
}

function goBack(){
  document.getElementById('page-input').classList.add('active');
  document.getElementById('page-estimate').classList.remove('active');
  window.scrollTo(0,0);
}

function goToEstimate(){
  var name = document.getElementById('customerName').value || 'お客様';
  var addr = document.getElementById('address').value;
  var today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  var type = currentTab==='kodate' ? '戸建て' : 'マンション';

  var rows = '';
  var deductTotal=0, addTotal=0;

  function tr(label,qty,unit,price,sub,isDed){
    var col = isDed ? 'color:#A32D2D' : '';
    var sign = isDed ? '－' : '';
    rows += '<tr><td>'+label+'</td><td>'+qty+'</td><td>'+unit+'</td><td>'+sign+fmt(price)+' 円</td><td style="'+col+'">'+sign+fmt(sub)+' 円</td></tr>';
  }

  rows += '<tr class="sec"><td colspan="5">■ 基本パック工事</td></tr>';
  rows += '<tr><td>水回り4点・床CF・ハウスクリーニング（諸経費込）</td><td>1</td><td>式</td><td>'+fmt(BASE)+' 円</td><td>'+fmt(BASE)+' 円</td></tr>';

  var hd=false;
  deductData.forEach(function(d){ var el=document.getElementById('d_'+d.id); if(el&&el.checked){
    if(!hd){ rows+='<tr class="sec"><td colspan="5">■ 基本パックから除く設備（減額）</td></tr>'; hd=true; }
    tr(d.label,1,'式',d.price,d.price,true); deductTotal+=d.price;
  }});

  var addH={};
  addData.forEach(function(g){ g.items.forEach(function(d){ var el=document.getElementById('a_'+d.id); if(el&&el.checked){
    if(!addH[g.group]){ rows+='<tr class="sec"><td colspan="5">■ 追加工事：'+g.group+'</td></tr>'; addH[g.group]=true; }
    var q=d.qty?Math.max(1,getNum('q_'+d.id,1)):1;
    var sub=d.price*q;
    tr(d.label,q,d.unit||'部屋',d.price,sub,false); addTotal+=sub;
  }}); });

  if(currentTab==='kodate'){
    var hk=false;
    kodateData.forEach(function(d){ var el=document.getElementById('k_'+d.id); if(el&&el.checked){
      if(!hk){ rows+='<tr class="sec"><td colspan="5">■ 戸建て専用工事</td></tr>'; hk=true; }
      tr(d.label,1,'式',d.price,d.price,false); addTotal+=d.price;
    }});
  }

  var ho=false;
  for(var i=1;i<=OTHER_COUNT;i++){ var oel=document.getElementById('ot_'+i); if(oel&&oel.checked){
    var nm=document.getElementById('oname_'+i).value||('その他工事'+i);
    var pr=getNum('oprice_'+i,0);
    if(!ho){ rows+='<tr class="sec"><td colspan="5">■ その他工事</td></tr>'; ho=true; }
    tr(nm,1,'式',pr,pr,false); addTotal+=pr;
  }}

  var net=BASE-deductTotal+addTotal;
  var buf=Math.round(net*0.3);
  var total=net+buf;

  var notes='<p>建物の状況によって追加工事が必要になる場合があります。</p><p>電気温水器・エコキュート（370ℓ）使用の場合、約20万円の追加費用が発生します。</p>';
  if(currentTab==='mansion') notes+='<p>マンションでのフローリング張替は、管理規約によりLL-45等級以上の防音フローリングが義務付けられている場合があり、別途費用がかかる場合があります。</p>';

  document.getElementById('estimateHTML').innerHTML =
    '<div class="est-header">' +
    '<div class="est-title">'+name+' 様邸（'+type+'）水回りリフォーム 概算お見積もり</div>' +
    (addr?'<div style="font-size:12px;color:#888;margin-top:4px">'+addr+'</div>':'') +
    '<div style="font-size:12px;color:#888;margin-top:4px">見積日：'+today+'</div>' +
    '<div class="est-total">'+fmt(total)+' 円（税込）</div>' +
    '<div class="est-note">※ 想定外補修費用（30%）を含む概算金額です</div>' +
    '</div>' +
    '<table class="est-table">' +
    '<thead><tr><th style="width:40%">工事名</th><th style="width:8%">数量</th><th style="width:8%">単位</th><th style="width:20%">単価</th><th style="width:24%">金額</th></tr></thead>' +
    '<tbody>' + rows +
    '<tr class="sub"><td colspan="4" style="text-align:right">小計（補修費前）</td><td>'+fmt(net)+' 円</td></tr>' +
    '<tr><td colspan="4" style="text-align:right">想定外補修費用（30%）</td><td>'+fmt(buf)+' 円</td></tr>' +
    '<tr class="grand"><td colspan="4" style="text-align:right">概算総額（税込）</td><td>'+fmt(total)+' 円</td></tr>' +
    '</tbody></table>' +
    '<div class="notes">'+notes+'</div>';

  document.getElementById('page-input').classList.remove('active');
  document.getElementById('page-estimate').classList.add('active');
  window.scrollTo(0,0);
}

buildDeductItems();
buildAddItems();
buildKodateItems();
buildOtherItems();
recalc();
</script>
